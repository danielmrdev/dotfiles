# Personal workspace layout
# Monitors: DP-3 = left, DP-4 = right

# Stable workspace defaults
workspace = 1, monitor:DP-3, defaultName:A, persistent:true
workspace = 2, monitor:DP-4, defaultName:B, persistent:true
workspace = 3, monitor:DP-4, defaultName:D, persistent:true
workspace = 4, monitor:DP-3, defaultName:T, persistent:true
workspace = 5, monitor:DP-3
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-4
workspace = 8, monitor:DP-4

# App placement
windowrule = match:class Alacritty, workspace 1
windowrule = match:class zen, workspace 2
windowrule = match:class chrome-cmnidpelfjhecdgmgpmdaehiajphajhi-Default, workspace 3
windowrule = match:class obsidian, workspace 3 silent
windowrule = match:class org\.mozilla\.Thunderbird, workspace 4
windowrule = match:class chrome-ompifgpmddkgmclendfeacglnodjjndh-Default, workspace 4
windowrule = match:class chrome-faolnafnngnfdaknnbpnkhgohbobgegn-Default, workspace 4
windowrule = match:class org\.remmina\.Remmina, workspace 8
windowrule = match:class pith, workspace 7

# Switch workspaces
bindd = SUPER, F1, Workspace T, workspace, 4
bindd = SUPER, F2, Workspace A, workspace, 1
bindd = SUPER, F3, Workspace B, workspace, 2
bindd = SUPER, F4, Workspace D, workspace, 3

# Move focused window to workspaces
bindd = SUPER SHIFT, F1, Move window to workspace T, movetoworkspace, 4
bindd = SUPER SHIFT, F2, Move window to workspace A, movetoworkspace, 1
bindd = SUPER SHIFT, F3, Move window to workspace B, movetoworkspace, 2
bindd = SUPER SHIFT, F4, Move window to workspace D, movetoworkspace, 3

# Temporary override: move current workspace to the other monitor
bindd = SUPER CTRL, M, Move current workspace to other monitor, movecurrentworkspacetomonitor, +1
