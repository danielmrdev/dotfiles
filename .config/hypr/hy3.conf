# hy3 - i3/sway-like tiling plugin
# https://github.com/outfoxxed/hy3

# Load plugin
plugin = /usr/lib/libhy3.so

# Override default layout (was dwindle)
general {
    layout = hy3
}

# hy3 config
plugin {
    hy3 {
        # Remove gaps when only one window (0=never, 1=always, 2=except single, 3=except single tab)
        no_gaps_when_only = 2
        # Collapse nested groups when possible
        node_collapse_policy = 2
        # Padding inside groups
        group_inset = 6

        # Tab bar config
        tabs {
            height = 24
            padding = 4
            from_top = false
            radius = 4
            border_width = 2
            render_text = true
            text_center = true
            text_font = "iA Writer Mono S"
            text_height = 9
            text_padding = 4
            opacity = 0.95
            blur = true

            # Colors matching theme (bg #00172e, fg #f6dcac)
            colors {
                # active tab (selected in focused group)
                active = rgba(33ccff40)
                active_border = rgba(33ccffee)
                active_text = rgba(f6dcacff)

                # focused tab (focused node in unfocused container)
                focused = rgba(60606040)
                focused_border = rgba(808080ee)
                focused_text = rgba(f6dcacff)

                # inactive tab
                inactive = rgba(00172e20)
                inactive_border = rgba(595959aa)
                inactive_text = rgba(f6dcac80)

                # urgent
                urgent = rgba(ff223340)
                urgent_border = rgba(ff2233ee)
                urgent_text = rgba(f6dcacff)

                # locked
                locked = rgba(90903340)
                locked_border = rgba(909033ee)
                locked_text = rgba(f6dcacff)
            }
        }

        # Autotile disabled by default
        autotile {
            enable = false
        }
    }
}

# ─── Keybinding overrides for hy3 ───

# Move focus with arrows (was movefocus -> hy3:movefocus)
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
bindd = SUPER, LEFT, Focus left, hy3:movefocus, l
bindd = SUPER, RIGHT, Focus right, hy3:movefocus, r
bindd = SUPER, UP, Focus up, hy3:movefocus, u
bindd = SUPER, DOWN, Focus down, hy3:movefocus, d

# Move window with SUPER+SHIFT+arrows (was swapwindow -> hy3:movewindow)
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
bindd = SUPER SHIFT, LEFT, Move window left, hy3:movewindow, l
bindd = SUPER SHIFT, RIGHT, Move window right, hy3:movewindow, r
bindd = SUPER SHIFT, UP, Move window up, hy3:movewindow, u
bindd = SUPER SHIFT, DOWN, Move window down, hy3:movewindow, d

# Toggle split direction (was togglesplit -> hy3:changegroup opposite)
unbind = SUPER, J
bindd = SUPER, J, Toggle split orientation, hy3:changegroup, opposite

# Toggle tab group (was dwindle/scrolling layout toggle -> hy3:togglTab)
unbind = SUPER, L
bindd = SUPER, L, Toggle tab group, hy3:changegroup, toggletab

# Tab navigation: prev/next tab within group
# SUPER+U / SUPER+I are free keys
bindd = SUPER, U, Previous tab, hy3:focustab, l
bindd = SUPER, I, Next tab, hy3:focustab, r

# Resize: expand/shrink focused node
bindd = SUPER, code:20, Expand window left, hy3:expand, shrink    # - key
bindd = SUPER, code:21, Shrink window left, hy3:expand, expand    # = key

# Equalize window sizes
bindd = SUPER, E, Equalize windows, hy3:equalize,

# Make explicit split groups (create new sub-container at focused window)
# Note: avoid SUPER+CTRL which conflicts with clipboard manager and hardware menu
bindd = SUPER ALT, V, Split vertical at window, hy3:makegroup, v
bindd = SUPER ALT, H, Split horizontal at window, hy3:makegroup, h
